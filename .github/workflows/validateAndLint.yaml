name: Validate and lint

on:
  push:
    branches: [claude, main]
    paths:
      - src/**
      - tests/**
      - composer.json
      - composer.lock
      - phpunit.xml
      - .github/workflows/validateAndLint.yaml
  pull_request:
    # No paths filter here: on a long-lived PR branch GitHub evaluates paths
    # against the cumulative PR diff, which always contains src/tests, so a filter
    # would never skip. The push trigger above is where path filtering takes effect.
    branches: [claude, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Validate, lint, and test (PHP 8.5 + DCMTK)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rbraunm/class_dicom.php-devenv:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Lint PHP sources
        run: find src tests -name '*.php' -print0 | xargs -0 -r -n1 php -l

      - name: Run tests
        run: vendor/bin/phpunit
