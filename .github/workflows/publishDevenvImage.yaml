name: Publish devenv image

on:
  push:
    branches: [main, claude]
    paths:
      - tools/devenv/provision.sh
      - tools/devenv/docker/Dockerfile
      - .github/workflows/publishDevenvImage.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publishImage:
    name: Build and publish devenv image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tools/devenv
          file: tools/devenv/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/rbraunm/class_dicom.php-devenv:latest
            ghcr.io/rbraunm/class_dicom.php-devenv:${{ github.sha }}
